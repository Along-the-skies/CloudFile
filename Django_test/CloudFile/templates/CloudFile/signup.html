<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - CloudFile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="logo">CloudFile</div>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'upload' %}">Upload</a>
        </div>
    </div>

    <!-- Hero -->
    <header class="hero">
        <h1>Create Your Account</h1>
        <p>Sign up to upload, manage, and share files securely.</p>
    </header>

    <!-- Signup Form -->
    <main class="form-container">
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="post" class="signup-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input id="username" type="text" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input id="email" type="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input id="password" type="password" name="password" required>
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2026 CloudFile. All rights reserved.
    </footer>
</body>
</html>
