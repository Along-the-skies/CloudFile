<!DOCTYPE html>
<html>
<head>
    <title>Upload Success</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CloudFile/style.css' %}">
</head>
<body>
    <header>
        <h1>File uploaded successfully!</h1>
    </header>

    <!-- Open Download Page button -->
    <form action="{% url 'download' file.id %}" method="get">
        <button type="submit" class="btn">Open Download Page</button>
    </form>

    <!-- Copy Link box -->
    <div class="copy-link">
        <label for="fileLink">Shareable Link:</label>
        <input type="text" id="fileLink" value="{% url 'download' file.id %}" readonly>
        <button onclick="copyLink()">Copy</button>
    </div>

    <script>
        function copyLink() {
            const linkBox = document.getElementById("fileLink");
            linkBox.select();
            linkBox.setSelectionRange(0, 99999); // for mobile
            navigator.clipboard.writeText(linkBox.value);
            alert("Link copied to clipboard!");
        }
    </script>

    <!-- Back to Home button -->
    <a href="/" class="btn">Back to Home</a>

    <footer>
        &copy; 2026 CloudFile. All rights reserved.
    </footer>
</body>
</html>
